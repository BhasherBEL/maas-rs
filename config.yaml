# Generic, runnable-out-of-the-box config (Luxembourg). A fresh clone can
# `cargo run -- --serve` and build a real graph. The first run downloads the
# OSM extract and one open GTFS feed. For the full Belgium engine (fares,
# realtime, addresses, DEM) run: `cargo run -- --config presets/belgium.yaml --serve`.
#
# The ONLY required key is `build.inputs`. `output` defaults to graph.bin and
# `default_routing` is optional (all tunables have compiled-in defaults).
build:
  inputs:
    # Small OSM extract (Geofabrik, ~40 MB). Geofabrik's `-latest` URL 302-redirects
    # to the current dated file.
    - ingestor: osm/pbf
      url: https://download.geofabrik.de/europe/luxembourg-latest.osm.pbf

    # National public-transport GTFS (data.public.lu, open data). The permalink
    # 302-redirects to the current GTFS zip.
    - ingestor: gtfs/generic
      name: luxembourg
      url: https://data.public.lu/fr/datasets/r/5713252d-7566-4957-bad3-b987d42fe6c1

server:
  # Set host to 0.0.0.0 to expose on all interfaces.
  host: 127.0.0.1
  port: 8000
