build:
  inputs:
    - ingestor: gtfs/stib
      name: STIB
      url: https://api-management-opendata-production.azure-api.net/api/gtfs/feed/stibmivb/static/
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"

    - ingestor: gtfs/sncb
      name: SNCB
      url: https://api-management-opendata-production.azure-api.net/api/gtfs/feed/nmbssncb/static/
      osm_url: path:data/belgium-latest.osm.pbf
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"

    - ingestor: osm/pbf
      url: path:data/belgium-latest.osm.pbf

  output: graph.bin
  osm_output: osm.bin

  delay_models:
    - mode: subway
      bins: [[-120, 0.01], [-60, 0.02], [0, 0.08], [60, 0.22], [120, 0.50], [180, 0.80], [240, 0.91], [300, 0.96], [420, 0.98], [600, 0.99], [900, 1.00]]
    - mode: tram
      bins: [[-300, 0.02], [-120, 0.08], [-60, 0.15], [0, 0.55], [60, 0.67], [120, 0.76], [180, 0.83], [300, 0.90], [600, 0.96], [900, 0.98], [1800, 1.00]]
    - mode: bus
      bins: [[-300, 0.03], [-120, 0.09], [-60, 0.16], [0, 0.45], [60, 0.58], [120, 0.67], [180, 0.74], [300, 0.84], [600, 0.93], [900, 0.97], [1800, 1.00]]
    - mode: rail
      bins: [[-300, 0.04], [-120, 0.10], [-60, 0.17], [0, 0.62], [60, 0.70], [120, 0.77], [180, 0.82], [300, 0.88], [360, 0.90], [600, 0.94], [900, 0.97], [1800, 0.99], [3600, 1.00]]

# Minimum log level: trace | debug | info | warn | error
log_level: info

default_routing: {}

server:
  host: 127.0.0.1
  port: 8000

auto_update:
  enabled: true
  schedule: "0 * * * *"   # Update GTFS every hour
  cache_dir: "cache"

# Realtime delay feeds. Secrets use ${VAR} (env) or ${file:/path}; the partner
# key is NEVER stored here — export BMC_PARTNER_KEY in the environment.
realtime:
  enabled: true
  poll_interval_secs: 30
  feeds:
    - type: gtfs-rt
      name: sncb
      url: "https://api-management-opendata-production.azure-api.net/api/gtfs/feed/nmbssncb/rt/trip-update/?format=protobuf"
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"
    - type: stib
      name: stib
      waiting_time_url: "https://api-management-opendata-production.azure-api.net/api/datasets/stibmivb/rt/WaitingTimes/"
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"
