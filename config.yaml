build:
  inputs:
    - ingestor: gtfs/stib
      name: STIB
      url: https://api-management-opendata-production.azure-api.net/api/gtfs/feed/stibmivb/static/
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"

    - ingestor: gtfs/sncb
      name: SNCB
      url: https://api-management-opendata-production.azure-api.net/api/gtfs/feed/nmbssncb/static/
      osm_url: path:data/belgium-latest.osm.pbf
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"

    - ingestor: osm/pbf
      url: path:data/belgium-latest.osm.pbf

  output: graph.bin
  osm_output: osm.bin

  delay_models:
    - mode: subway
      bins: [[-180, 0.009], [-120, 0.039], [-60, 0.123], [0, 0.629], [60, 0.777], [120, 0.86], [180, 0.927], [240, 0.97], [300, 0.986], [360, 0.991], [660, 0.992], [720, 0.992], [900, 0.992], [960, 0.994], [1020, 0.995], [1080, 1]]
    - mode: tram
      bins: [[-60, 0.018], [0, 0.607], [60, 0.857], [120, 0.982], [180, 1]]
    - mode: bus
      bins: [[-300, 0.008], [-240, 0.019], [-180, 0.043], [-120, 0.095], [-60, 0.192], [0, 0.503], [60, 0.644], [120, 0.747], [180, 0.82], [240, 0.869], [300, 0.905], [360, 0.93], [420, 0.947], [480, 0.959], [540, 0.968], [600, 0.975], [660, 0.98], [720, 0.984], [780, 0.987], [840, 0.989], [900, 0.991], [960, 0.992], [1020, 0.994], [1080, 0.994], [1140, 1]]
    - mode: rail
      bins: [[0, 0.455], [60, 0.747], [120, 0.855], [180, 0.903], [240, 0.937], [300, 0.952], [360, 0.963], [420, 0.97], [480, 0.975], [540, 0.979], [600, 0.983], [660, 0.985], [720, 0.986], [780, 0.987], [840, 0.988], [900, 0.991], [960, 0.992], [1020, 0.993], [1080, 0.993], [1140, 0.994], [1200, 0.995], [1320, 0.995], [1380, 1]]

# Minimum log level: trace | debug | info | warn | error
log_level: info

default_routing: {}

server:
  host: 127.0.0.1
  port: 8000

auto_update:
  enabled: true
  schedule: "0 * * * *"   # Update GTFS every hour
  cache_dir: "cache"

# Realtime delay feeds. Secrets use ${VAR} (env) or ${file:/path}; the partner
# key is NEVER stored here — export BMC_PARTNER_KEY in the environment.
realtime:
  enabled: true
  poll_interval_secs: 30
  feeds:
    - type: gtfs-rt
      name: sncb
      url: "https://api-management-opendata-production.azure-api.net/api/gtfs/feed/nmbssncb/rt/trip-update/?format=protobuf"
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"
    - type: stib
      name: stib
      waiting_time_url: "https://api-management-opendata-production.azure-api.net/api/datasets/stibmivb/rt/WaitingTimes/"
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"
