build:
  inputs:
    - ingestor: gtfs/stib
      name: STIB
      url: https://api-management-opendata-production.azure-api.net/api/gtfs/feed/stibmivb/static/
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"

    - ingestor: gtfs/sncb
      name: SNCB
      url: https://api-management-opendata-production.azure-api.net/api/gtfs/feed/nmbssncb/static/
      osm_url: path:data/belgium-latest.osm.pbf
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"

    - ingestor: gtfs/generic
      name: DeLijn
      url: https://api-management-opendata-production.azure-api.net/api/gtfs/feed/delijn/static/
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"

    - ingestor: osm/pbf
      url: path:data/belgium-latest.osm.pbf

  output: graph.bin
  osm_output: osm.bin
  elevation: path:data/belgium-DTM-20m.tif

  delay_models:
    - mode: subway
      bins: [[-180, 0.009], [-120, 0.039], [-60, 0.123], [0, 0.629], [60, 0.777], [120, 0.86], [180, 0.927], [240, 0.97], [300, 0.986], [360, 0.991], [660, 0.992], [720, 0.992], [900, 0.992], [960, 0.994], [1020, 0.995], [1080, 1]]
    - mode: tram
      bins: [[-60, 0.018], [0, 0.607], [60, 0.857], [120, 0.982], [180, 1]]
    - mode: bus
      bins: [[-300, 0.008], [-240, 0.019], [-180, 0.043], [-120, 0.095], [-60, 0.192], [0, 0.503], [60, 0.644], [120, 0.747], [180, 0.82], [240, 0.869], [300, 0.905], [360, 0.93], [420, 0.947], [480, 0.959], [540, 0.968], [600, 0.975], [660, 0.98], [720, 0.984], [780, 0.987], [840, 0.989], [900, 0.991], [960, 0.992], [1020, 0.994], [1080, 0.994], [1140, 1]]
    - mode: rail
      bins: [[0, 0.455], [60, 0.747], [120, 0.855], [180, 0.903], [240, 0.937], [300, 0.952], [360, 0.963], [420, 0.97], [480, 0.975], [540, 0.979], [600, 0.983], [660, 0.985], [720, 0.986], [780, 0.987], [840, 0.988], [900, 0.991], [960, 0.992], [1020, 0.993], [1080, 0.993], [1140, 0.994], [1200, 0.995], [1320, 0.995], [1380, 1]]

log_level: info

default_routing:
  max_window_minutes: 1440
  max_snap_distance_m: 10000
  cycling_speed_mps: 4.2
  driving_speed_mps: 11.0
  vehicle_access_secs: 1200
  bike_profile:
    allow_steps: true
    ignore_cycleroutes: false
    stick_to_cycleroutes: true
    avoid_unsafe: true
    consider_elevation: true
    uphillcost: 0
    uphillcutoff: 1.5
    downhillcost: 100
    downhillcutoff: 0.5
    total_mass: 90
    max_speed: 45
    s_c_x: 0.225
    c_r: 0.01
    biker_power: 100
  # Stochastic access/egress times. Walk/bike/drive times are log-normal: the
  # routed time is the median; access legs are planned at access_percentile to
  # buffer the connection, egress at the mean for an honest arrival estimate.
  street_time:
    access_percentile: 0.85   # buffer to catch the scheduled departure
    sigma_alpha: 3.8          # spread scale; sigma = alpha / sqrt(seconds)
    sigma_floor: 0.12         # min spread (long trips never become over-confident)
    sigma_cap: 0.5            # max spread (very short trips)

server:
  host: 192.168.0.211
  port: 8000

auto_update:
  enabled: true
  schedule: "0 * * * *"
  cache_dir: "cache"

realtime:
  enabled: true
  poll_interval_secs: 30
  feeds:
    - type: gtfs-rt
      name: sncb
      url: "https://api-management-opendata-production.azure-api.net/api/gtfs/feed/nmbssncb/rt/trip-update/?format=protobuf"
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"
    - type: stib
      name: stib
      waiting_time_url: "https://api-management-opendata-production.azure-api.net/api/datasets/stibmivb/rt/WaitingTimes/"
      headers:
        Cache-Control: "no-cache"
        bmc-partner-key: "${BMC_PARTNER_KEY}"
